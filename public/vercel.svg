<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#72d6ff" />
      <stop offset="100%" stop-color="#2a93ff" />
    </linearGradient>
    
    <linearGradient id="bgInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#007bff" />
    </linearGradient>

    <filter id="shadowMain" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#004e92" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowDoc" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#003b73" flood-opacity="0.2"/>
    </filter>
    <filter id="shadowFold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-3" dy="5" stdDeviation="5" flood-color="#003b73" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="320" height="320" rx="80" fill="url(#bgOuter)" filter="url(#shadowMain)" />
  
  <rect x="46" y="46" width="308" height="308" rx="74" fill="url(#bgInner)" />

  <path d="M 130 80
           L 245 80
           L 300 135
           L 300 290
           C 300 306.5 286.5 320 270 320
           L 130 320
           C 113.5 320 100 306.5 100 290
           L 100 110
           C 100 93.5 113.5 80 130 80 Z"
        fill="#ffffff" filter="url(#shadowDoc)" />

  <path d="M 245 80
           C 245 120 255 135 300 135
           C 275 125 255 100 245 80 Z"
        fill="url(#foldGrad)" filter="url(#shadowFold)" />

  <path d="M 135 225
           L 175 135
           L 215 215
           L 265 145"
        fill="none" stroke="#0091ff" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round" />

  <line x1="135" y1="280" x2="265" y2="280"
        stroke="#dce7f3" stroke-width="8" stroke-linecap="round" />
</svg>
